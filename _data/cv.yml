    Publications:
      - title: "Draft-based Approximate Inference for LLMs"
        authors:
          - "Kevin Galim*"
          - "Ethan Ewer*"
          - "Wonjun Kang"
          - "Minjae Lee"
          - "Hyung Il Koo"
          - "Kangwook Lee"
        publisher: International Conference on Learning Representations (ICLR)
        releaseDate: 2026
        url: https://arxiv.org/abs/2506.08373
        summary: "We present a unified framework for approximate inference in long-context LLMs using small draft models to predict token and KV-cache importance. We introduce SpecKV, SpecPC, and SpecKV-PC, enabling more accurate KV-cache and prompt compression while preserving the same efficiency gains in memory usage, latency, and throughput."

      - title: "ParallelBench: Understanding the Trade-offs of Parallel Decoding in Diffusion LLMs"
        authors:
          - "Wonjun Kang*"
          - "Kevin Galim*"
          - "Seunghyuk Oh*"
          - "Minjae Lee"
          - "Yuchen Zeng"
          - "Shuibai Zhang"
          - "Coleman Hooper"
          - "Yuezhou Hu"
          - "Hyung Il Koo"
          - "Nam Ik Cho"
          - "et al."
        publisher: International Conference on Learning Representations (ICLR)
        releaseDate: 2026
        url: https://arxiv.org/abs/2510.04767
        summary: "Analyzes the fundamental limitations of parallel decoding in diffusion LLMs and introduces ParallelBench, the first benchmark designed to measure quality degradation caused by token dependency violations. Reveals key speed–quality trade-offs and highlights the need for new decoding strategies."

      - title: "Inference-Aligned SFT for Diffusion LLMs via Group-based Trajectory Sampling"
        authors:
          - "Seunghyuk Oh"
          - "Minjae Lee"
          - "Kevin Galim"
          - "Minseo Kim"
          - "Hyung Il Koo"
          - "Wonjun Kang"
          - "Hanbaek Lyu"
          - "Kangwook Lee"
        publisher: ICLR Workshop on Decoding and Generation with Language Models (DeLTa)
        releaseDate: 2026

      - title: "TABED: Test-Time Adaptive Ensemble Drafting for Robust Speculative Decoding in LVLMs"
        authors:
          - "Minjae Lee*"
          - "Wonjun Kang*"
          - "Byeongkeun Ahn"
          - "Christian Classen"
          - "Kevin Galim"
          - "Seunghyuk Oh"
          - "Minghao Yan"
          - "Hyung Il Koo"
          - "Kangwook Lee"
        publisher: Conference of the European Chapter of the Association for Computational Linguistics (EACL)
        releaseDate: 2026
        url: https://arxiv.org/abs/2601.20357
        summary: "We study speculative decoding for Large Vision-Language Models (LVLMs) and benchmark existing drafting strategies across diverse multimodal scenarios. We propose TABED, a training-free adaptive ensemble drafting method that dynamically combines batched drafts, achieving up to 1.74× inference speedup and improved robustness over single-draft approaches."

      - title: "UNCAGE: Contrastive Attention Guidance for Masked Generative Transformers in Text-to-Image Generation"
        authors:
          - "Wonjun Kang"
          - "Byeongkeun Ahn"
          - "Minjae Lee"
          - "Kevin Galim"
          - "Seunghyuk Oh"
          - "Hyung Il Koo"
          - "Nam Ik Cho"
        publisher: IEEE Access
        releaseDate: 2026
        url: https://arxiv.org/abs/2508.05399
        summary: "We study compositional text-to-image generation in Masked Generative Transformers, which remain underexplored compared to diffusion models. We propose UNCAGE, a training-free method that leverages contrastive attention guidance to prioritize object-representative tokens during unmasking, improving compositional fidelity with negligible inference overhead."

      - title: "State-offset Tuning: State-based Parameter-Efficient Fine-Tuning for State Space Models"
        authors:
          - "Wonjun Kang*"
          - "Kevin Galim*"
          - "Yuchen Zeng*"
          - "Minjae Lee"
          - "Hyung Il Koo"
          - "Nam Ik Cho"
        publisher: Annual Meeting of the Association for Computational Linguistics (ACL)
        releaseDate: 2025
        url: https://arxiv.org/abs/2503.03499
        summary: "We investigate parameter-efficient fine-tuning for State Space Models, where prompt-based approaches such as prompt tuning and prefix tuning are ineffective. We propose state-based PEFT methods, including State-offset Tuning, which directly adjusts model states at each timestep to improve adaptation."

      - title: "Parameter-Efficient Fine-Tuning of State Space Models"
        authors:
          - "Kevin Galim*"
          - "Wonjun Kang*"
          - "Yuchen Zeng*"
          - "Hyung Il Koo"
          - "Kangwook Lee"
        publisher: International Conference on Machine Learning (ICML)
        releaseDate: 2025
        url: https://arxiv.org/abs/2410.09016
        summary: "Introduces Sparse Dimension Tuning (SDT), a parameter-efficient fine-tuning method specifically designed for state space models such as Mamba. By combining SDT for SSM modules with LoRA for projection layers, achieves state-of-the-art performance for adapting SSM-based language models with minimal additional parameters."

      - title: "Counting Guidance for High Fidelity Text-to-Image Synthesis"
        authors:
          - "Wonjun Kang*"
          - "Kevin Galim*"
          - "Hyung Il Koo"
          - "Nam Ik Cho"
        publisher: "Winter Conference on Applications of Computer Vision (WACV) — Oral"
        releaseDate: 2025
        url: https://arxiv.org/abs/2306.17567
        summary: "We address the challenge of generating the correct number of objects in text-to-image diffusion models. We propose a guidance method that leverages a reference-less counting network and attention-based object masks to steer the denoising process, improving object-count fidelity in generated images."

      - title: "Eta Inversion: Designing an Optimal Eta Function for Diffusion-based Real Image Editing"
        authors:
          - "Wonjun Kang*"
          - "Kevin Galim*"
          - "Hyung Il Koo"
        publisher: European Conference on Computer Vision (ECCV)
        releaseDate: 2024
        url: https://arxiv.org/abs/2403.09468
        summary: "We study diffusion inversion for real image editing, where existing methods struggle to balance faithfulness to the source image and alignment with the edit prompt. We propose a diffusion inversion method with time- and region-dependent η control, enabling flexible editing while preserving image fidelity."

      - title: "Focus on Defocus: Bridging the Synthetic to Real Domain Gap for Depth Estimation"
        authors:
          - "Maxim Maximov"
          - "Kevin Galim"
          - "Laura Leal-Taixé"
        publisher: "IEEE/CVF Conference on Computer Vision and Pattern Recognition (CVPR)"
        releaseDate: 2020
        url: https://arxiv.org/abs/2005.09623
        summary: "We address the generalization challenge in depth estimation, where models trained on synthetic data often fail on real-world scenes due to domain gaps. We propose a method that leverages domain-invariant defocus blur cues and a permutation-invariant network, enabling models trained on synthetic data to generalize effectively to real images."


